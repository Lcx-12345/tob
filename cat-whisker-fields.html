<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Whisker Fields — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Cat Whisker Fields</h1>
            <div class="subtitle">Generative whiskers probing invisible force fields</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Whisker Count</label>
                    <div class="slider-container">
                        <input type="range" id="whiskerCount" min="50" max="500" step="10" value="200" oninput="updateParam('whiskerCount', this.value)">
                        <span class="value-display" id="whiskerCount-value">200</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.02" step="0.001" value="0.005" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.005</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Speed</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.1" max="3.0" step="0.1" value="1.0" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Whisker Length</label>
                    <div class="slider-container">
                        <input type="range" id="whiskerLength" min="50" max="400" step="10" value="200" oninput="updateParam('whiskerLength', this.value)">
                        <span class="value-display" id="whiskerLength-value">200</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Whisker Thickness</label>
                    <div class="slider-container">
                        <input type="range" id="whiskerThickness" min="0.5" max="4" step="0.1" value="1.5" oninput="updateParam('whiskerThickness', this.value)">
                        <span class="value-display" id="whiskerThickness-value">1.5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Turbulence</label>
                    <div class="slider-container">
                        <input type="range" id="turbulence" min="0" max="1" step="0.05" value="0.5" oninput="updateParam('turbulence', this.value)">
                        <span class="value-display" id="turbulence-value">0.5</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Center Warmth</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#e8a87c" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#e8a87c</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Mid Tone</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#c38d6b" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#c38d6b</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Edge Cool</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#7a9e9f" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#7a9e9f</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Accent</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#d4b896" onchange="updateColor('color4', this.value)">
                        <span class="color-value" id="color4-value">#d4b896</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="regenerate()">Regenerate</button>
                    <button class="button secondary" onclick="resetParameters()">Reset</button>
                </div>
                <div style="margin-top: 8px;">
                    <button class="button tertiary" onclick="downloadPNG()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 12345,
            whiskerCount: 200,
            noiseScale: 0.005,
            flowSpeed: 1.0,
            whiskerLength: 200,
            whiskerThickness: 1.5,
            turbulence: 0.5,
            colorPalette: ['#e8a87c', '#c38d6b', '#7a9e9f', '#d4b896']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let whiskers = [];
        let canvas;
        let isGenerating = false;

        function setup() {
            canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            whiskers = [];
            isGenerating = true;

            let centerX = width / 2;
            let centerY = height / 2;

            for (let i = 0; i < params.whiskerCount; i++) {
                let angle = random(TWO_PI);
                let w = new Whisker(centerX, centerY, angle, i);
                whiskers.push(w);
            }

            background(250, 249, 245);

            for (let w of whiskers) {
                w.generate();
            }

            for (let w of whiskers) {
                w.render();
            }

            isGenerating = false;
        }

        class Whisker {
            constructor(startX, startY, angle, index) {
                this.points = [];
                this.startX = startX;
                this.startY = startY;
                this.baseAngle = angle;
                this.index = index;
                this.length = params.whiskerLength + random(-30, 30);
                this.thickness = params.whiskerThickness * random(0.5, 1.5);

                let colorIndex = floor(random(params.colorPalette.length));
                this.baseColor = color(params.colorPalette[colorIndex]);

                let distFromCenter = random(0, 1);
                if (distFromCenter < 0.3) {
                    this.baseColor = color(params.colorPalette[0]);
                } else if (distFromCenter < 0.6) {
                    this.baseColor = color(params.colorPalette[1]);
                } else if (distFromCenter < 0.85) {
                    this.baseColor = color(params.colorPalette[3]);
                } else {
                    this.baseColor = color(params.colorPalette[2]);
                }
            }

            generate() {
                let x = this.startX;
                let y = this.startY;
                let angle = this.baseAngle;

                let stepSize = 2;
                let numSteps = floor(this.length / stepSize);

                for (let i = 0; i < numSteps; i++) {
                    let t = i / numSteps;

                    let ns = params.noiseScale;
                    let turb = params.turbulence;

                    let noise1 = noise(x * ns * 0.3, y * ns * 0.3, this.index * 0.1);
                    let noise2 = noise(x * ns, y * ns, this.index * 0.5 + 100);
                    let noise3 = noise(x * ns * 3, y * ns * 3, this.index * 0.2 + 200);

                    let flowAngle = (noise1 - 0.5) * TWO_PI * 2;
                    flowAngle += (noise2 - 0.5) * TWO_PI * turb;
                    flowAngle += (noise3 - 0.5) * TWO_PI * turb * 0.5;

                    angle = lerp(angle, this.baseAngle + flowAngle, 0.15 * params.flowSpeed);

                    let speed = stepSize * (0.8 + noise3 * 0.4);
                    x += cos(angle) * speed;
                    y += sin(angle) * speed;

                    this.points.push({
                        x: x,
                        y: y,
                        t: t,
                        speed: speed
                    });
                }
            }

            render() {
                if (this.points.length < 2) return;

                noFill();

                for (let i = 0; i < this.points.length - 1; i++) {
                    let p1 = this.points[i];
                    let p2 = this.points[i + 1];

                    let alpha = map(p1.t, 0, 1, 220, 0);
                    alpha = pow(alpha / 255, 0.7) * 255;

                    let sw = map(p1.t, 0, 1, this.thickness, 0.1);
                    sw = max(sw, 0.1);

                    let c = color(red(this.baseColor), green(this.baseColor), blue(this.baseColor), alpha);

                    stroke(c);
                    strokeWeight(sw);
                    line(p1.x, p1.y, p2.x, p2.y);
                }
            }
        }

        function updateParam(paramName, value) {
            let numValue = parseFloat(value);
            params[paramName] = numValue;
            document.getElementById(paramName + '-value').textContent = value;
            initializeSystem();
        }

        function updateColor(colorId, value) {
            let index = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[index] = value;
            document.getElementById(colorId + '-value').textContent = value;
            initializeSystem();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function regenerate() {
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('whiskerCount').value = params.whiskerCount;
            document.getElementById('whiskerCount-value').textContent = params.whiskerCount;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('flowSpeed').value = params.flowSpeed;
            document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
            document.getElementById('whiskerLength').value = params.whiskerLength;
            document.getElementById('whiskerLength-value').textContent = params.whiskerLength;
            document.getElementById('whiskerThickness').value = params.whiskerThickness;
            document.getElementById('whiskerThickness-value').textContent = params.whiskerThickness;
            document.getElementById('turbulence').value = params.turbulence;
            document.getElementById('turbulence-value').textContent = params.turbulence;

            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            document.getElementById('color4').value = params.colorPalette[3];
            document.getElementById('color4-value').textContent = params.colorPalette[3];

            updateSeedDisplay();
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas(canvas, 'cat-whisker-fields-seed-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
