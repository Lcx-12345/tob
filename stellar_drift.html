<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Drift - Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button { margin-bottom: 0; }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group { margin-bottom: 16px; }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active { transform: translateY(0); }

        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: #0a0a14;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
            .canvas-area { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Stellar Drift</h1>
            <div class="subtitle">Cosmic particles flowing through invisible gravitational fields</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="8000" step="500" value="3000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">3000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Speed</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.5" max="4.0" step="0.5" value="2.0" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">2.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.010" step="0.001" value="0.004" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.004</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Trail Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="trailOpacity" min="1" max="30" step="1" value="6" oninput="updateParam('trailOpacity', this.value)">
                        <span class="value-display" id="trailOpacity-value">6</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Curl Strength</label>
                    <div class="slider-container">
                        <input type="range" id="curlStrength" min="0.5" max="5.0" step="0.5" value="2.0" oninput="updateParam('curlStrength', this.value)">
                        <span class="value-display" id="curlStrength-value">2.0</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Stellar Core</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#ffd699" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#ffd699</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Nebula Warm</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#e85d75" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#e85d75</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Cosmic Cool</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#4a90d9" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#4a90d9</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing stellar drift...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            particleCount: 3000,
            flowSpeed: 2.0,
            noiseScale: 0.004,
            trailOpacity: 6,
            curlStrength: 2.0,
            colorPalette: ['#ffd699', '#e85d75', '#4a90d9']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let particles = [];
        let zOff = 0;

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 255, b: 255 };
        }

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            colorMode(RGB, 255, 255, 255, 255);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new StellarParticle());
            }
            zOff = 0;
            background(10, 10, 20);
        }

        function draw() {
            noStroke();
            fill(10, 10, 20, params.trailOpacity);
            rect(0, 0, width, height);

            zOff += 0.0003;

            for (let i = 0; i < particles.length; i++) {
                particles[i].follow();
                particles[i].update();
                particles[i].edges();
                particles[i].show();
            }
        }

        class StellarParticle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = p5.Vector.random2D().mult(0.5);
                this.acc = createVector(0, 0);
                this.maxSpeed = params.flowSpeed;
                this.prevPos = this.pos.copy();
                this.age = 0;
                this.maxAge = floor(random(80, 300));
                let ci = floor(random(3));
                let rgb = hexToRgb(params.colorPalette[ci]);
                this.cr = rgb.r;
                this.cg = rgb.g;
                this.cb = rgb.b;
                this.baseAlpha = random(80, 200);
            }

            follow() {
                let x = floor(this.pos.x / 20);
                let y = floor(this.pos.y / 20);
                let angle = noise(x * params.noiseScale * 10, y * params.noiseScale * 10, zOff) * TWO_PI * params.curlStrength;
                let force = p5.Vector.fromAngle(angle);
                force.mult(0.3);
                this.acc.add(force);
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.prevPos = this.pos.copy();
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.age++;
                if (this.age > this.maxAge) {
                    this.respawn();
                }
            }

            respawn() {
                this.pos = createVector(random(width), random(height));
                this.vel = p5.Vector.random2D().mult(0.5);
                this.prevPos = this.pos.copy();
                this.age = 0;
                this.maxAge = floor(random(80, 300));
                let ci = floor(random(3));
                let rgb = hexToRgb(params.colorPalette[ci]);
                this.cr = rgb.r;
                this.cg = rgb.g;
                this.cb = rgb.b;
                this.baseAlpha = random(80, 200);
            }

            edges() {
                let wrapped = false;
                if (this.pos.x > width) { this.pos.x = 0; wrapped = true; }
                if (this.pos.x < 0) { this.pos.x = width; wrapped = true; }
                if (this.pos.y > height) { this.pos.y = 0; wrapped = true; }
                if (this.pos.y < 0) { this.pos.y = height; wrapped = true; }
                if (wrapped) this.prevPos = this.pos.copy();
            }

            show() {
                let lifeRatio = this.age / this.maxAge;
                let alpha;
                if (lifeRatio < 0.1) {
                    alpha = map(lifeRatio, 0, 0.1, 0, this.baseAlpha);
                } else if (lifeRatio > 0.8) {
                    alpha = map(lifeRatio, 0.8, 1, this.baseAlpha, 0);
                } else {
                    alpha = this.baseAlpha;
                }
                let speed = this.vel.mag();
                let brightness = map(speed, 0, this.maxSpeed, 0.6, 1.4);
                let r = constrain(this.cr * brightness, 0, 255);
                let g = constrain(this.cg * brightness, 0, 255);
                let b = constrain(this.cb * brightness, 0, 255);
                stroke(r, g, b, alpha);
                strokeWeight(map(speed, 0, this.maxSpeed, 0.5, 1.8));
                line(this.prevPos.x, this.prevPos.y, this.pos.x, this.pos.y);
            }
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = value;
            if (paramName === 'particleCount') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('flowSpeed').value = params.flowSpeed;
            document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('trailOpacity').value = params.trailOpacity;
            document.getElementById('trailOpacity-value').textContent = params.trailOpacity;
            document.getElementById('curlStrength').value = params.curlStrength;
            document.getElementById('curlStrength-value').textContent = params.curlStrength;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
