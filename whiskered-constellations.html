<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiskered Constellations - Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Whiskered Constellations</h1>
            <div class="subtitle">Gravitational whiskers tracing celestial arcs through warm, dark space. Each particle is a photon drawn by invisible feline eyes.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="1000" max="8000" step="500" value="4000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">4000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Gravity Strength</label>
                    <div class="slider-container">
                        <input type="range" id="gravityStrength" min="0.5" max="3.0" step="0.1" value="1.5" oninput="updateParam('gravityStrength', this.value)">
                        <span class="value-display" id="gravityStrength-value">1.5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.02" step="0.001" value="0.006" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.006</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Trail Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="trailOpacity" min="1" max="30" step="1" value="12" oninput="updateParam('trailOpacity', this.value)">
                        <span class="value-display" id="trailOpacity-value">12</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Eye Count</label>
                    <div class="slider-container">
                        <input type="range" id="eyeCount" min="1" max="5" step="1" value="2" oninput="updateParam('eyeCount', this.value)">
                        <span class="value-display" id="eyeCount-value">2</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Warmth</label>
                    <div class="slider-container">
                        <input type="range" id="warmth" min="0" max="1" step="0.05" value="0.7" oninput="updateParam('warmth', this.value)">
                        <span class="value-display" id="warmth-value">0.7</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Primary (Ginger)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#e8a87c" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#e8a87c</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Secondary (Burnt Sienna)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#c38d6b" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#c38d6b</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Accent (Cream)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#f5e6d3" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#f5e6d3</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Background (Dark Warmth)</label>
                    <div class="color-picker-container">
                        <input type="color" id="bgColor" value="#2a2520" onchange="updateColor('bgColor', this.value)">
                        <span class="color-value" id="bgColor-value">#2a2520</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="regenerate()">Regenerate</button>
                    <button class="button secondary" onclick="resetParameters()">Reset</button>
                </div>
                <div style="margin-top: 8px;">
                    <button class="button tertiary" onclick="downloadPNG()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 12345,
            particleCount: 4000,
            gravityStrength: 1.5,
            noiseScale: 0.006,
            trailOpacity: 12,
            eyeCount: 2,
            warmth: 0.7,
            colorPalette: ['#e8a87c', '#c38d6b', '#f5e6d3'],
            bgColor: '#2a2520'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let particles = [];
        let attractors = [];
        let canvas;

        function setup() {
            canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            particles = [];
            attractors = [];

            let bg = hexToRgb(params.bgColor);
            background(bg.r, bg.g, bg.b);

            let margin = width * 0.15;
            for (let i = 0; i < params.eyeCount; i++) {
                let x = random(margin, width - margin);
                let y = random(margin, height - margin);
                let strength = random(0.8, 1.5) * params.gravityStrength;
                attractors.push(new Attractor(x, y, strength));
            }

            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle());
            }

            for (let step = 0; step < 300; step++) {
                for (let p of particles) {
                    p.update();
                    p.display();
                }
            }

            noLoop();
        }

        class Attractor {
            constructor(x, y, strength) {
                this.pos = createVector(x, y);
                this.strength = strength;
                this.baseX = x;
                this.baseY = y;
                this.noiseOffset = random(1000);
            }

            getPosition() {
                let nx = noise(frameCount * 0.01 + this.noiseOffset) - 0.5;
                let ny = noise(frameCount * 0.01 + this.noiseOffset + 100) - 0.5;
                return createVector(
                    this.baseX + nx * 30,
                    this.baseY + ny * 30
                );
            }
        }

        class Particle {
            constructor() {
                let edge = floor(random(4));
                let margin = 20;

                switch(edge) {
                    case 0: this.pos = createVector(random(width), -margin); break;
                    case 1: this.pos = createVector(width + margin, random(height)); break;
                    case 2: this.pos = createVector(random(width), height + margin); break;
                    case 3: this.pos = createVector(-margin, random(height)); break;
                }

                this.vel = createVector(random(-1, 1), random(-1, 1));
                this.vel.normalize();
                this.vel.mult(random(1, 3));

                this.life = random(150, 400);
                this.maxLife = this.life;
                this.history = [];
                this.colorIndex = floor(random(params.colorPalette.length));
                this.noiseOffset = random(10000);
            }

            update() {
                this.history.push(this.pos.copy());
                if (this.history.length > 20) {
                    this.history.shift();
                }

                let force = createVector(0, 0);

                for (let a of attractors) {
                    let pos = a.getPosition();
                    let dir = p5.Vector.sub(pos, this.pos);
                    let dist = dir.mag();
                    dir.normalize();

                    let g = a.strength * 80 / (dist * 0.5 + 10);
                    dir.mult(g);
                    force.add(dir);
                }

                let noiseForce = createVector(
                    noise(this.pos.x * params.noiseScale, this.pos.y * params.noiseScale, this.noiseOffset) - 0.5,
                    noise(this.pos.x * params.noiseScale + 1000, this.pos.y * params.noiseScale + 1000, this.noiseOffset) - 0.5
                );
                noiseForce.mult(0.3);
                force.add(noiseForce);

                this.vel.add(force);
                this.vel.limit(4);
                this.pos.add(this.vel);
                this.life--;
            }

            display() {
                if (this.history.length < 2) return;

                let lifeRatio = this.life / this.maxLife;
                let speed = this.vel.mag();

                let col = hexToRgb(params.colorPalette[this.colorIndex]);
                let warmthFactor = params.warmth;

                let r = col.r + speed * 15 * warmthFactor;
                let g = col.g + speed * 8 * warmthFactor;
                let b = col.b - speed * 5 * (1 - warmthFactor);

                r = constrain(r, 0, 255);
                g = constrain(g, 0, 255);
                b = constrain(b, 0, 255);

                let alpha = params.trailOpacity * lifeRatio * (0.5 + speed * 0.15);
                alpha = constrain(alpha, 1, 80);

                noFill();
                beginShape();
                for (let i = 0; i < this.history.length; i++) {
                    let progress = i / this.history.length;
                    let segmentAlpha = alpha * progress * lifeRatio;
                    stroke(r, g, b, segmentAlpha);
                    strokeWeight(0.5 + progress * 1.5);
                    vertex(this.history[i].x, this.history[i].y);
                }
                endShape();
            }

            isDead() {
                return this.life <= 0 ||
                       this.pos.x < -100 || this.pos.x > width + 100 ||
                       this.pos.y < -100 || this.pos.y > height + 100;
            }
        }

        function draw() {
            let bg = hexToRgb(params.bgColor);
            background(bg.r, bg.g, bg.b, 8);

            for (let p of particles) {
                p.update();
                p.display();

                if (p.isDead()) {
                    let edge = floor(random(4));
                    let margin = 20;
                    switch(edge) {
                        case 0: p.pos = createVector(random(width), -margin); break;
                        case 1: p.pos = createVector(width + margin, random(height)); break;
                        case 2: p.pos = createVector(random(width), height + margin); break;
                        case 3: p.pos = createVector(-margin, random(height)); break;
                    }
                    p.vel = createVector(random(-1, 1), random(-1, 1));
                    p.vel.normalize();
                    p.vel.mult(random(1, 3));
                    p.life = random(150, 400);
                    p.maxLife = p.life;
                    p.history = [];
                }
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 42, g: 37, b: 32 };
        }

        function updateParam(paramName, value) {
            if (paramName === 'particleCount' || paramName === 'eyeCount') {
                params[paramName] = parseInt(value);
            } else {
                params[paramName] = parseFloat(value);
            }
            document.getElementById(paramName + '-value').textContent = value;

            if (paramName === 'particleCount' || paramName === 'eyeCount') {
                initializeSystem();
            } else {
                loop();
            }
        }

        function updateColor(colorId, value) {
            document.getElementById(colorId + '-value').textContent = value;

            if (colorId === 'bgColor') {
                params.bgColor = value;
                initializeSystem();
            } else {
                let index = parseInt(colorId.replace('color', '')) - 1;
                params.colorPalette[index] = value;
                loop();
            }
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function regenerate() {
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('gravityStrength').value = params.gravityStrength;
            document.getElementById('gravityStrength-value').textContent = params.gravityStrength;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('trailOpacity').value = params.trailOpacity;
            document.getElementById('trailOpacity-value').textContent = params.trailOpacity;
            document.getElementById('eyeCount').value = params.eyeCount;
            document.getElementById('eyeCount-value').textContent = params.eyeCount;
            document.getElementById('warmth').value = params.warmth;
            document.getElementById('warmth-value').textContent = params.warmth;

            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            document.getElementById('bgColor').value = params.bgColor;
            document.getElementById('bgColor-value').textContent = params.bgColor;

            updateSeedDisplay();
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas('whiskered-constellations-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
