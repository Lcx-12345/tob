<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Resonance — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20,20,19,0.1); background: white; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Stickman Resonance</h1>
            <div class="subtitle">Minimal figures emerging from computational choreography — each seed a unique dance.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>Figure Count</label>
                    <div class="slider-container">
                        <input type="range" id="figureCount" min="3" max="30" step="1" value="12" oninput="updateParam('figureCount', this.value)">
                        <span class="value-display" id="figureCount-value">12</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Motion Speed</label>
                    <div class="slider-container">
                        <input type="range" id="motionSpeed" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateParam('motionSpeed', this.value)">
                        <span class="value-display" id="motionSpeed-value">1.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Limb Length</label>
                    <div class="slider-container">
                        <input type="range" id="limbLength" min="20" max="80" step="5" value="45" oninput="updateParam('limbLength', this.value)">
                        <span class="value-display" id="limbLength-value">45</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Noise Perturbation</label>
                    <div class="slider-container">
                        <input type="range" id="noiseAmt" min="0.0" max="1.0" step="0.05" value="0.4" oninput="updateParam('noiseAmt', this.value)">
                        <span class="value-display" id="noiseAmt-value">0.4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Ghost Trail</label>
                    <div class="slider-container">
                        <input type="range" id="ghostTrail" min="0" max="12" step="1" value="5" oninput="updateParam('ghostTrail', this.value)">
                        <span class="value-display" id="ghostTrail-value">5</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Warm Tone</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#d97757" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#d97757</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Cool Tone</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#6a9bcc" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#6a9bcc</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Accent</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#788c5d" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#788c5d</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            figureCount: 12,
            motionSpeed: 1.0,
            limbLength: 45,
            noiseAmt: 0.4,
            ghostTrail: 5,
            colorPalette: ['#d97757', '#6a9bcc', '#788c5d']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));
        let figures = [];
        let globalTime = 0;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            document.querySelector('.loading').style.display = 'none';
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            figures = [];
            for (let i = 0; i < params.figureCount; i++) {
                figures.push(new StickFigure(i));
            }
            globalTime = 0;
            background(250, 249, 245);
        }

        function draw() {
            let bgAlpha = map(params.ghostTrail, 0, 12, 255, 18);
            fill(250, 249, 245, bgAlpha);
            noStroke();
            rect(0, 0, width, height);

            for (let fig of figures) {
                fig.update();
                fig.display();
            }
            globalTime += 0.016 * params.motionSpeed;
        }

        class StickFigure {
            constructor(index) {
                this.index = index;
                this.baseX = random(width * 0.1, width * 0.9);
                this.baseY = random(height * 0.35, height * 0.85);
                this.scale = random(0.7, 1.4);
                this.phase = random(TWO_PI);
                this.walkFreq = random(1.5, 3.5);
                this.swayAmt = random(0.1, 0.4);
                this.actionType = floor(random(4));
                this.colorIndex = index % 3;
                this.noiseOffX = random(1000);
                this.noiseOffY = random(2000);
                this.facing = random() > 0.5 ? 1 : -1;
                this.driftSpeed = random(0.3, 1.2);
                this.driftRange = random(40, 150);
                this.originX = this.baseX;
            }

            update() {
                let t = globalTime;
                let nOff = params.noiseAmt;

                let drift = sin(t * this.driftSpeed + this.phase) * this.driftRange;
                this.baseX = this.originX + drift;
                this.baseX += (noise(this.noiseOffX + t * 0.3) - 0.5) * 100 * nOff;
                this.baseY += (noise(this.noiseOffY + t * 0.2) - 0.5) * 30 * nOff;
                this.baseY = constrain(this.baseY, height * 0.2, height * 0.9);
            }

            display() {
                let t = globalTime;
                let s = this.scale;
                let L = params.limbLength * s;
                let headR = L * 0.22;
                let bodyLen = L * 1.0;
                let armLen = L * 0.7;
                let legLen = L * 0.85;
                let neckLen = L * 0.15;

                let cx = this.baseX;
                let hipY = this.baseY;
                let shoulderY = hipY - bodyLen;
                let headY = shoulderY - neckLen - headR;

                let walkPhase = t * this.walkFreq + this.phase;
                let sway = sin(walkPhase * 0.5) * this.swayAmt * L * 0.15;

                let col = color(params.colorPalette[this.colorIndex]);
                let vel = abs(sin(walkPhase));
                let r = red(col), g = green(col), b = blue(col);
                let alphaBase = 180 + vel * 75;

                strokeWeight(max(2, 3.5 * s));
                strokeCap(ROUND);
                strokeJoin(ROUND);

                let legSwing = sin(walkPhase) * 0.5 * (1 + params.noiseAmt * 0.5);
                let armSwing = sin(walkPhase + PI) * 0.4 * (1 + params.noiseAmt * 0.3);

                let shoulderSway = sway * 0.5;

                let headBob = abs(sin(walkPhase)) * headR * 0.15;

                let leftFootX = cx - legLen * 0.3 + sin(walkPhase) * legLen * 0.35;
                let leftFootY = hipY + legLen;
                let rightFootX = cx + legLen * 0.3 + sin(walkPhase + PI) * legLen * 0.35;
                let rightFootY = hipY + legLen;

                let leftKneeX = (cx - legLen * 0.15 + leftFootX) * 0.5;
                let leftKneeY = hipY + legLen * 0.5 - abs(sin(walkPhase)) * legLen * 0.12;
                let rightKneeX = (cx + legLen * 0.15 + rightFootX) * 0.5;
                let rightKneeY = hipY + legLen * 0.5 - abs(sin(walkPhase + PI)) * legLen * 0.12;

                let leftHandX = cx - armLen * 0.6 + sin(walkPhase + PI) * armLen * 0.4 + shoulderSway;
                let leftHandY = shoulderY + armLen * 0.7 + abs(sin(walkPhase + PI)) * armLen * 0.15;
                let rightHandX = cx + armLen * 0.6 + sin(walkPhase) * armLen * 0.4 + shoulderSway;
                let rightHandY = shoulderY + armLen * 0.7 + abs(sin(walkPhase)) * armLen * 0.15;

                let leftElbowX = (cx - armLen * 0.2 + shoulderSway + leftHandX) * 0.5;
                let leftElbowY = shoulderY + armLen * 0.4;
                let rightElbowX = (cx + armLen * 0.2 + shoulderSway + rightHandX) * 0.5;
                let rightElbowY = shoulderY + armLen * 0.4;

                if (this.actionType === 1) {
                    let jumpPhase = sin(walkPhase * 0.5);
                    let jumpH = max(0, jumpPhase) * L * 0.8;
                    let squash = jumpPhase > 0 ? 1.0 : 1.0 + max(0, -jumpPhase) * 0.15;
                    hipY -= jumpH;
                    shoulderY -= jumpH;
                    headY -= jumpH;
                    leftFootY -= jumpH * 0.6;
                    rightFootY -= jumpH * 0.6;
                    leftKneeY -= jumpH * 0.6;
                    rightKneeY -= jumpH * 0.6;
                    leftHandY -= jumpH * 0.8;
                    rightHandY -= jumpH * 0.8;
                    leftElbowY -= jumpH * 0.8;
                    rightElbowY -= jumpH * 0.8;
                    if (jumpPhase > 0.3) {
                        leftHandY = shoulderY - armLen * 0.3;
                        rightHandY = shoulderY - armLen * 0.3;
                        leftHandX = cx - armLen * 0.8 + shoulderSway;
                        rightHandX = cx + armLen * 0.8 + shoulderSway;
                        leftElbowX = cx - armLen * 0.5 + shoulderSway;
                        leftElbowY = shoulderY - armLen * 0.1;
                        rightElbowX = cx + armLen * 0.5 + shoulderSway;
                        rightElbowY = shoulderY - armLen * 0.1;
                    }
                } else if (this.actionType === 2) {
                    let danceAngle = sin(walkPhase * 1.5) * 0.3;
                    leftHandX = cx + cos(danceAngle - 0.5) * armLen * 0.9;
                    leftHandY = shoulderY + sin(danceAngle - 0.5) * armLen * 0.5;
                    rightHandX = cx + cos(danceAngle + 0.5) * armLen * 0.9;
                    rightHandY = shoulderY + sin(danceAngle + 0.5) * armLen * 0.5;
                    leftElbowX = (cx + shoulderSway + leftHandX) * 0.5;
                    leftElbowY = shoulderY + armLen * 0.2;
                    rightElbowX = (cx + shoulderSway + rightHandX) * 0.5;
                    rightElbowY = shoulderY + armLen * 0.2;
                    leftFootX = cx - legLen * 0.3 + sin(walkPhase * 1.5) * legLen * 0.25;
                    rightFootX = cx + legLen * 0.3 + sin(walkPhase * 1.5 + PI * 0.5) * legLen * 0.25;
                } else if (this.actionType === 3) {
                    let reach = sin(walkPhase * 0.7);
                    rightHandX = cx + armLen * 1.2 * this.facing + shoulderSway;
                    rightHandY = shoulderY - armLen * 0.2 + reach * armLen * 0.3;
                    rightElbowX = cx + armLen * 0.6 * this.facing + shoulderSway;
                    rightElbowY = shoulderY + armLen * 0.1;
                    leftHandX = cx - armLen * 0.3 + shoulderSway;
                    leftHandY = shoulderY + armLen * 0.5;
                    leftElbowX = cx - armLen * 0.15 + shoulderSway;
                    leftElbowY = shoulderY + armLen * 0.25;
                }

                let nOff2 = params.noiseAmt;
                leftFootX += (noise(t * 0.5 + this.index * 10) - 0.5) * 15 * nOff2;
                rightFootX += (noise(t * 0.5 + this.index * 10 + 50) - 0.5) * 15 * nOff2;
                leftHandX += (noise(t * 0.5 + this.index * 10 + 100) - 0.5) * 10 * nOff2;
                rightHandX += (noise(t * 0.5 + this.index * 10 + 150) - 0.5) * 10 * nOff2;

                let figAlpha = alphaBase;
                stroke(r, g, b, figAlpha * 0.15);
                strokeWeight(max(1, 2 * s));
                this.drawLimb(cx + shoulderSway, hipY, cx + shoulderSway, shoulderY);
                this.drawLimb(cx + shoulderSway, shoulderY, cx + shoulderSway * 0.8, headY + headR);
                noFill();
                ellipse(cx + shoulderSway * 0.8, headY + headBob, headR * 2, headR * 2);

                stroke(r, g, b, figAlpha);
                strokeWeight(max(2, 3.5 * s));

                this.drawLimb(cx + shoulderSway, hipY, leftKneeX, leftKneeY);
                this.drawLimb(leftKneeX, leftKneeY, leftFootX, leftFootY);
                this.drawLimb(cx + shoulderSway, hipY, rightKneeX, rightKneeY);
                this.drawLimb(rightKneeX, rightKneeY, rightFootX, rightFootY);

                this.drawLimb(cx + shoulderSway, shoulderY, leftElbowX, leftElbowY);
                this.drawLimb(leftElbowX, leftElbowY, leftHandX, leftHandY);
                this.drawLimb(cx + shoulderSway, shoulderY, rightElbowX, rightElbowY);
                this.drawLimb(rightElbowX, rightElbowY, rightHandX, rightHandY);

                this.drawLimb(cx + shoulderSway, shoulderY, cx + shoulderSway * 0.8, headY + headBob + headR);
                noFill();
                strokeWeight(max(2, 3.5 * s));
                ellipse(cx + shoulderSway * 0.8, headY + headBob, headR * 2, headR * 2);

                fill(r, g, b, figAlpha * 0.6);
                noStroke();
                let eyeOff = headR * 0.25 * this.facing;
                ellipse(cx + shoulderSway * 0.8 - eyeOff - headR * 0.15, headY + headBob - headR * 0.1, headR * 0.18, headR * 0.18);
                ellipse(cx + shoulderSway * 0.8 - eyeOff + headR * 0.15, headY + headBob - headR * 0.1, headR * 0.18, headR * 0.18);

                stroke(r, g, b, figAlpha * 0.08);
                strokeWeight(max(1, 6 * s));
                noFill();
                ellipse(cx, hipY + legLen * 0.5, L * 0.3, L * 0.3);
            }

            drawLimb(x1, y1, x2, y2) {
                line(x1, y1, x2, y2);
            }
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = value;
            if (paramName === 'figureCount') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('figureCount').value = params.figureCount;
            document.getElementById('figureCount-value').textContent = params.figureCount;
            document.getElementById('motionSpeed').value = params.motionSpeed;
            document.getElementById('motionSpeed-value').textContent = params.motionSpeed;
            document.getElementById('limbLength').value = params.limbLength;
            document.getElementById('limbLength-value').textContent = params.limbLength;
            document.getElementById('noiseAmt').value = params.noiseAmt;
            document.getElementById('noiseAmt-value').textContent = params.noiseAmt;
            document.getElementById('ghostTrail').value = params.ghostTrail;
            document.getElementById('ghostTrail-value').textContent = params.ghostTrail;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });

        console.log("[Stickman] Initializing resonance algorithm...");
        console.warn("[Stickman] This is a mock warning — deprecated API call detected");
        console.error("[Stickman] MockError: Failed to fetch resource at /api/data", new Error("Network request failed"));

        setTimeout(function() {
            try {
                var obj = undefined;
                obj.access.deep.property;
            } catch (err) {
                console.error("[Stickman] Uncaught TypeError:", err);
            }
        }, 3000);

        Promise.reject(new Error("Mock unhandled promise rejection — async operation failed"));
    </script>
</body>
</html>
