<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cymatic Resonance — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Cymatic Resonance</h1>
            <div class="subtitle">Standing waves on a vibrating plate — sand migrates to nodal lines where opposing waves cancel, revealing the hidden geometry of sound.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Vibration Modes</h3>

                <div class="control-group">
                    <label>Mode A</label>
                    <div class="slider-container">
                        <input type="range" id="modeA" min="1" max="12" step="1" value="3" oninput="updateParam('modeA', this.value)">
                        <span class="value-display" id="modeA-value">3</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Mode B</label>
                    <div class="slider-container">
                        <input type="range" id="modeB" min="1" max="12" step="1" value="4" oninput="updateParam('modeB', this.value)">
                        <span class="value-display" id="modeB-value">4</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Mode C</label>
                    <div class="slider-container">
                        <input type="range" id="modeC" min="1" max="12" step="1" value="5" oninput="updateParam('modeC', this.value)">
                        <span class="value-display" id="modeC-value">5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Mode D</label>
                    <div class="slider-container">
                        <input type="range" id="modeD" min="1" max="12" step="1" value="2" oninput="updateParam('modeD', this.value)">
                        <span class="value-display" id="modeD-value">2</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Material</h3>

                <div class="control-group">
                    <label>Grain Density</label>
                    <div class="slider-container">
                        <input type="range" id="grainDensity" min="5000" max="80000" step="1000" value="40000" oninput="updateParam('grainDensity', this.value)">
                        <span class="value-display" id="grainDensity-value">40000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Organic Noise</label>
                    <div class="slider-container">
                        <input type="range" id="organicNoise" min="0" max="1.0" step="0.05" value="0.25" oninput="updateParam('organicNoise', this.value)">
                        <span class="value-display" id="organicNoise-value">0.25</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Nodal Sand</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#c9a84c" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#c9a84c</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Antinode Void</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#1a1612" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#1a1612</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Transition Bronze</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#8b5e3c" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#8b5e3c</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Plate Surface</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#f5f0e8" onchange="updateColor('color4', this.value)">
                        <span class="color-value" id="color4-value">#f5f0e8</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="exportImage()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 12345,
            modeA: 3,
            modeB: 4,
            modeC: 5,
            modeD: 2,
            grainDensity: 40000,
            organicNoise: 0.25,
            colorPalette: ['#c9a84c', '#1a1612', '#8b5e3c', '#f5f0e8']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let grains = [];
        let canvasW = 1200;
        let canvasH = 1200;
        let iterationCount = 0;
        let maxIterations = 120;

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function lerpColor(c1, c2, t) {
            t = Math.max(0, Math.min(1, t));
            return {
                r: Math.round(c1.r + (c2.r - c1.r) * t),
                g: Math.round(c1.g + (c2.g - c1.g) * t),
                b: Math.round(c1.b + (c2.b - c1.b) * t)
            };
        }

        function chladni(x, y) {
            let a = params.modeA;
            let b = params.modeB;
            let c = params.modeC;
            let d = params.modeD;
            let val = Math.sin(Math.PI * a * x) * Math.sin(Math.PI * b * y)
                    + Math.sin(Math.PI * c * x) * Math.sin(Math.PI * d * y);
            if (params.organicNoise > 0) {
                let n = noise(x * 4, y * 4);
                val += params.organicNoise * (n - 0.5) * 0.8;
            }
            return val;
        }

        function chladniGradient(x, y) {
            let eps = 0.002;
            let cx = chladni(x, y);
            let dx = (chladni(x + eps, y) - cx) / eps;
            let dy = (chladni(x, y + eps) - cx) / eps;
            return { val: cx, dx: dx, dy: dy };
        }

        function setup() {
            let canvas = createCanvas(canvasW, canvasH);
            canvas.parent('canvas-container');
            colorMode(RGB);
            document.querySelector('.loading').style.display = 'none';
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            grains = [];
            iterationCount = 0;

            for (let i = 0; i < params.grainDensity; i++) {
                let x = random();
                let y = random();
                grains.push({
                    x: x,
                    y: y,
                    settled: false,
                    settleCount: 0,
                    size: random(0.8, 1.8)
                });
            }

            background(hexToRgb(params.colorPalette[3]).r,
                       hexToRgb(params.colorPalette[3]).g,
                       hexToRgb(params.colorPalette[3]).b);

            loop();
        }

        function draw() {
            if (iterationCount >= maxIterations) {
                noLoop();
                return;
            }

            let sandRgb = hexToRgb(params.colorPalette[0]);
            let voidRgb = hexToRgb(params.colorPalette[1]);
            let transRgb = hexToRgb(params.colorPalette[2]);
            let plateRgb = hexToRgb(params.colorPalette[3]);

            let stepSize = 0.008 * (1 - iterationCount / maxIterations * 0.5);

            for (let g of grains) {
                if (g.settled) continue;

                let grad = chladniGradient(g.x, g.y);
                let mag = Math.sqrt(grad.dx * grad.dx + grad.dy * grad.dy);

                if (mag < 0.5) {
                    g.settleCount++;
                    if (g.settleCount > 8) {
                        g.settled = true;
                    }
                    continue;
                }

                let nx = -grad.dx / mag;
                let ny = -grad.dy / mag;

                g.x += nx * stepSize + (random() - 0.5) * stepSize * 0.3;
                g.y += ny * stepSize + (random() - 0.5) * stepSize * 0.3;

                g.x = Math.max(0.001, Math.min(0.999, g.x));
                g.y = Math.max(0.001, Math.min(0.999, g.y));
            }

            if (iterationCount % 3 === 0) {
                let bgRgb = plateRgb;
                background(bgRgb.r, bgRgb.g, bgRgb.b, 12);
            }

            noStroke();
            for (let g of grains) {
                let val = Math.abs(chladni(g.x, g.y));
                let maxVal = 2.0;
                let normalizedVal = Math.min(val / maxVal, 1.0);
                let proximity = 1.0 - normalizedVal;

                let grainColor;
                if (proximity > 0.7) {
                    grainColor = lerpColor(transRgb, sandRgb, (proximity - 0.7) / 0.3);
                } else if (proximity > 0.3) {
                    grainColor = lerpColor(voidRgb, transRgb, (proximity - 0.3) / 0.4);
                } else {
                    grainColor = lerpColor(plateRgb, voidRgb, proximity / 0.3);
                }

                let alpha = 120 + proximity * 135;
                let px = g.x * canvasW;
                let py = g.y * canvasH;
                let sz = g.size * (1 + proximity * 0.8);

                fill(grainColor.r, grainColor.g, grainColor.b, alpha);
                ellipse(px, py, sz, sz);
            }

            iterationCount++;
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            if (paramName === 'organicNoise') {
                document.getElementById(paramName + '-value').textContent = numVal.toFixed(2);
            } else {
                document.getElementById(paramName + '-value').textContent = numVal % 1 === 0 ? numVal : numVal.toFixed(2);
            }
            initializeSystem();
        }

        function updateColor(colorId, value) {
            let index = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[index] = value;
            document.getElementById(colorId + '-value').textContent = value;
            initializeSystem();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('modeA').value = params.modeA;
            document.getElementById('modeA-value').textContent = params.modeA;
            document.getElementById('modeB').value = params.modeB;
            document.getElementById('modeB-value').textContent = params.modeB;
            document.getElementById('modeC').value = params.modeC;
            document.getElementById('modeC-value').textContent = params.modeC;
            document.getElementById('modeD').value = params.modeD;
            document.getElementById('modeD-value').textContent = params.modeD;
            document.getElementById('grainDensity').value = params.grainDensity;
            document.getElementById('grainDensity-value').textContent = params.grainDensity;
            document.getElementById('organicNoise').value = params.organicNoise;
            document.getElementById('organicNoise-value').textContent = params.organicNoise.toFixed(2);

            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            document.getElementById('color4').value = params.colorPalette[3];
            document.getElementById('color4-value').textContent = params.colorPalette[3];

            updateSeedDisplay();
            initializeSystem();
        }

        function exportImage() {
            saveCanvas('cymatic-resonance-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
