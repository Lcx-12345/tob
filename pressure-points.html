<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressure Points — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Pressure Points</h1>
            <div class="subtitle">The geometry of contact — force radiates from seeded epicenters, deforming a crystalline field of dormant nodes into patterns of consequence.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Pressure Points</label>
                    <div class="slider-container">
                        <input type="range" id="epicenterCount" min="1" max="8" step="1" value="3" oninput="updateParam('epicenterCount', this.value)">
                        <span class="value-display" id="epicenterCount-value">3</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Force Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="forceIntensity" min="30" max="200" step="5" value="100" oninput="updateParam('forceIntensity', this.value)">
                        <span class="value-display" id="forceIntensity-value">100</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Grid Density</label>
                    <div class="slider-container">
                        <input type="range" id="gridDensity" min="8" max="24" step="1" value="14" oninput="updateParam('gridDensity', this.value)">
                        <span class="value-display" id="gridDensity-value">14</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Spiral Twist</label>
                    <div class="slider-container">
                        <input type="range" id="spiralTwist" min="0" max="1.5" step="0.05" value="0.4" oninput="updateParam('spiralTwist', this.value)">
                        <span class="value-display" id="spiralTwist-value">0.40</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Node Sides</label>
                    <div class="slider-container">
                        <input type="range" id="nodeSides" min="3" max="8" step="1" value="6" oninput="updateParam('nodeSides', this.value)">
                        <span class="value-display" id="nodeSides-value">6</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Wave Noise</label>
                    <div class="slider-container">
                        <input type="range" id="waveNoise" min="0" max="1.0" step="0.05" value="0.3" oninput="updateParam('waveNoise', this.value)">
                        <span class="value-display" id="waveNoise-value">0.30</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Dormant Field</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#c8c4b8" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#c8c4b8</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Pressure Warm</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#d97757" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#d97757</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Pressure Cool</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#6a9bcc" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#6a9bcc</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Deep Accent</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#3d2b1f" onchange="updateColor('color4', this.value)">
                        <span class="color-value" id="color4-value">#3d2b1f</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="exportImage()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 12345,
            epicenterCount: 3,
            forceIntensity: 100,
            gridDensity: 14,
            spiralTwist: 0.4,
            nodeSides: 6,
            waveNoise: 0.3,
            colorPalette: ['#c8c4b8', '#d97757', '#6a9bcc', '#3d2b1f']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let nodes = [];
        let epicenters = [];
        let canvasW = 1200;
        let canvasH = 1200;

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function lerpColor(c1, c2, t) {
            t = Math.max(0, Math.min(1, t));
            return {
                r: Math.round(c1.r + (c2.r - c1.r) * t),
                g: Math.round(c1.g + (c2.g - c1.g) * t),
                b: Math.round(c1.b + (c2.b - c1.b) * t)
            };
        }

        function setup() {
            let canvas = createCanvas(canvasW, canvasH);
            canvas.parent('canvas-container');
            colorMode(RGB);
            document.querySelector('.loading').style.display = 'none';
            initializeSystem();
            noLoop();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            nodes = [];
            epicenters = [];

            let spacing = canvasW / (params.gridDensity + 1);
            let margin = spacing;

            for (let i = 0; i < params.epicenterCount; i++) {
                let ex = random(margin * 2, canvasW - margin * 2);
                let ey = random(margin * 2, canvasH - margin * 2);
                let eForce = random(0.6, 1.0) * params.forceIntensity;
                let eType = i % 2;
                epicenters.push({ x: ex, y: ey, force: eForce, type: eType });
            }

            for (let gx = 0; gx < params.gridDensity; gx++) {
                for (let gy = 0; gy < params.gridDensity; gy++) {
                    let baseX = margin + (gx + 0.5) * spacing;
                    let baseY = margin + (gy + 0.5) * spacing;

                    let jitterX = (random() - 0.5) * spacing * 0.15;
                    let jitterY = (random() - 0.5) * spacing * 0.15;
                    baseX += jitterX;
                    baseY += jitterY;

                    let totalDx = 0;
                    let totalDy = 0;
                    let totalRotation = 0;
                    let totalInfluence = 0;
                    let dominantType = 0;
                    let maxInf = 0;

                    for (let e of epicenters) {
                        let dx = baseX - e.x;
                        let dy = baseY - e.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        let maxDist = params.forceIntensity * 4.5;

                        if (dist < maxDist && dist > 0.1) {
                            let normalizedDist = dist / maxDist;
                            let influence = Math.pow(1 - normalizedDist, 2.2);

                            let noiseVal = noise(baseX * 0.008, baseY * 0.008, e.x * 0.01);
                            influence *= (1 - params.waveNoise * 0.5 + params.waveNoise * noiseVal);

                            let angle = Math.atan2(dy, dx);
                            let spiralAngle = angle + params.spiralTwist * (1 - normalizedDist) * Math.PI;

                            let pushMag = influence * e.force * 0.6;
                            totalDx += Math.cos(spiralAngle) * pushMag;
                            totalDy += Math.sin(spiralAngle) * pushMag;

                            totalRotation += influence * params.spiralTwist * 2.5 * (e.type === 0 ? 1 : -1);
                            totalInfluence += influence;

                            if (influence > maxInf) {
                                maxInf = influence;
                                dominantType = e.type;
                            }
                        }
                    }

                    totalInfluence = Math.min(totalInfluence, 1.0);

                    let finalX = baseX + totalDx;
                    let finalY = baseY + totalDy;

                    let baseSize = spacing * 0.32;
                    let sizeMultiplier = 1 + totalInfluence * 0.8;
                    let nodeSize = baseSize * sizeMultiplier;

                    nodes.push({
                        x: finalX,
                        y: finalY,
                        origX: baseX,
                        origY: baseY,
                        size: nodeSize,
                        rotation: totalRotation,
                        influence: totalInfluence,
                        dominantType: dominantType,
                        sides: params.nodeSides
                    });
                }
            }

            redraw();
        }

        function draw() {
            background(250, 249, 245);

            let dormantRgb = hexToRgb(params.colorPalette[0]);
            let warmRgb = hexToRgb(params.colorPalette[1]);
            let coolRgb = hexToRgb(params.colorPalette[2]);
            let deepRgb = hexToRgb(params.colorPalette[3]);

            for (let e of epicenters) {
                let maxR = params.forceIntensity * 4.5;
                let eColor = e.type === 0 ? warmRgb : coolRgb;
                noStroke();
                for (let ring = 5; ring >= 1; ring--) {
                    let r = maxR * (ring / 5);
                    let alpha = 8 + ring * 2;
                    fill(eColor.r, eColor.g, eColor.b, alpha);
                    ellipse(e.x, e.y, r * 2, r * 2);
                }
            }

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let dx = nodes[i].x - nodes[j].x;
                    let dy = nodes[i].y - nodes[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let spacing = canvasW / (params.gridDensity + 1);
                    let connectDist = spacing * 1.6;

                    if (dist < connectDist) {
                        let lineAlpha = Math.pow(1 - dist / connectDist, 1.5) * 40;
                        let avgInfluence = (nodes[i].influence + nodes[j].influence) / 2;
                        let lineColor = lerpColor(dormantRgb, deepRgb, avgInfluence * 0.5);
                        stroke(lineColor.r, lineColor.g, lineColor.b, lineAlpha);
                        strokeWeight(0.6);
                        line(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
                    }
                }
            }

            for (let n of nodes) {
                push();
                translate(n.x, n.y);
                rotate(n.rotation);

                let fillColor;
                let strokeColor;
                let alpha = 180 + n.influence * 75;

                if (n.influence < 0.01) {
                    fillColor = { r: dormantRgb.r, g: dormantRgb.g, b: dormantRgb.b };
                    strokeColor = { r: dormantRgb.r - 20, g: dormantRgb.g - 20, b: dormantRgb.b - 20 };
                } else {
                    let targetColor = n.dominantType === 0 ? warmRgb : coolRgb;
                    let midInfluence = Math.pow(n.influence, 0.7);
                    fillColor = lerpColor(dormantRgb, targetColor, midInfluence * 0.85);

                    if (n.influence > 0.6) {
                        fillColor = lerpColor(fillColor, deepRgb, (n.influence - 0.6) * 0.5);
                    }
                    strokeColor = lerpColor(dormantRgb, deepRgb, midInfluence * 0.6);
                }

                fill(fillColor.r, fillColor.g, fillColor.b, alpha);
                stroke(strokeColor.r, strokeColor.g, strokeColor.b, alpha * 0.8);
                strokeWeight(0.8);

                let radius = n.size / 2;
                beginShape();
                for (let s = 0; s < n.sides; s++) {
                    let angle = (TWO_PI / n.sides) * s - PI / 2;
                    let r = radius;
                    if (n.influence > 0.1) {
                        let noiseR = noise(n.origX * 0.02 + s * 0.5, n.origY * 0.02);
                        r += radius * 0.15 * n.influence * (noiseR - 0.5);
                    }
                    vertex(Math.cos(angle) * r, Math.sin(angle) * r);
                }
                endShape(CLOSE);

                if (n.influence > 0.3) {
                    let innerRadius = radius * 0.4;
                    let innerAlpha = (n.influence - 0.3) * 120;
                    let innerColor = lerpColor(fillColor, deepRgb, 0.3);
                    fill(innerColor.r, innerColor.g, innerColor.b, innerAlpha);
                    noStroke();
                    beginShape();
                    for (let s = 0; s < n.sides; s++) {
                        let angle = (TWO_PI / n.sides) * s - PI / 2 + PI / n.sides;
                        vertex(Math.cos(angle) * innerRadius, Math.sin(angle) * innerRadius);
                    }
                    endShape(CLOSE);
                }

                pop();
            }

            for (let e of epicenters) {
                let eColor = e.type === 0 ? warmRgb : coolRgb;
                noStroke();
                fill(eColor.r, eColor.g, eColor.b, 60);
                ellipse(e.x, e.y, 12, 12);
                fill(deepRgb.r, deepRgb.g, deepRgb.b, 120);
                ellipse(e.x, e.y, 5, 5);
            }
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = numVal % 1 === 0 ? numVal : numVal.toFixed(2);
            initializeSystem();
        }

        function updateColor(colorId, value) {
            let index = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[index] = value;
            document.getElementById(colorId + '-value').textContent = value;
            initializeSystem();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('epicenterCount').value = params.epicenterCount;
            document.getElementById('epicenterCount-value').textContent = params.epicenterCount;
            document.getElementById('forceIntensity').value = params.forceIntensity;
            document.getElementById('forceIntensity-value').textContent = params.forceIntensity;
            document.getElementById('gridDensity').value = params.gridDensity;
            document.getElementById('gridDensity-value').textContent = params.gridDensity;
            document.getElementById('spiralTwist').value = params.spiralTwist;
            document.getElementById('spiralTwist-value').textContent = params.spiralTwist.toFixed(2);
            document.getElementById('nodeSides').value = params.nodeSides;
            document.getElementById('nodeSides-value').textContent = params.nodeSides;
            document.getElementById('waveNoise').value = params.waveNoise;
            document.getElementById('waveNoise-value').textContent = params.waveNoise.toFixed(2);

            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            document.getElementById('color4').value = params.colorPalette[3];
            document.getElementById('color4-value').textContent = params.colorPalette[3];

            updateSeedDisplay();
            initializeSystem();
        }

        function exportImage() {
            saveCanvas('pressure-points-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
